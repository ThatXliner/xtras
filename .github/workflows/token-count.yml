name: Token Count

on:
  push:
    branches: [main]
    paths:
      - "skills/**/SKILL.md"
  pull_request:
    paths:
      - "skills/**/SKILL.md"

jobs:
  count-tokens:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install tiktoken
        run: bun add tiktoken

      - name: Count tokens
        id: count
        run: |
          count() {
            bun -e '
            import { encoding_for_model } from "tiktoken";
            import { readFileSync, existsSync } from "fs";
            const f = process.argv[1];
            const enc = encoding_for_model("gpt-5");
            const tokens = existsSync(f) ? enc.encode(readFileSync(f, "utf-8")).length : 0;
            enc.free();
            console.log(tokens);
            ' "$1"
          }
          XCOMMIT=$(count skills/x-commit/SKILL.md)
          XHUMANIZER=$(count skills/x-humanizer/SKILL.md)
          echo "xcommit=$XCOMMIT" >> "$GITHUB_OUTPUT"
          echo "xhumanizer=$XHUMANIZER" >> "$GITHUB_OUTPUT"
          echo "x-commit: $XCOMMIT tokens"
          echo "x-humanizer: $XHUMANIZER tokens"

      - name: Update x-commit badge gist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: x-commit-tokens.json
          label: X-commit Tokens
          message: ${{ steps.count.outputs.xcommit }}
          valColorRange: ${{ steps.count.outputs.xcommit }}
          minColorRange: 0
          maxColorRange: 3000
          invertColorRange: true

      - name: Update x-humanizer badge gist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: x-humanizer-tokens.json
          label: X-humanizer Tokens
          message: ${{ steps.count.outputs.xhumanizer }}
          valColorRange: ${{ steps.count.outputs.xhumanizer }}
          minColorRange: 0
          maxColorRange: 3000
          invertColorRange: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const xcommit = Number('${{ steps.count.outputs.xcommit }}');
            const xhumanizer = Number('${{ steps.count.outputs.xhumanizer }}');
            const dot = (n) => n < 1000 ? '🟢' : n < 2000 ? '🟡' : '🔴';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '**Token count per skill:**',
                `${dot(xcommit)} x-commit: ${xcommit} tokens`,
                `${dot(xhumanizer)} x-humanizer: ${xhumanizer} tokens`,
              ].join('\n')
            });
